name: nexuscare
description: NexusCare – AI-Powered Smart Health Care Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Networking & state
  http: ^1.2.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2   # web-compatible storage
  # UI
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
