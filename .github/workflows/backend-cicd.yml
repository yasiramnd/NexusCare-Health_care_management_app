# =============================================================================
# NexusCare Backend - CI/CD Pipeline (Docker Hub + AWS EC2)
#
# Flow:  Lint/Test  -->  Docker Build & Smoke Test  -->  Push to Docker Hub  -->  Deploy to EC2
#
# Required GitHub Secrets (Settings > Secrets > Actions):
#
#   ── Docker Hub ──────────────────────────────────────────────────────────────
#   DOCKERHUB_USERNAME          kavindur2003
#   DOCKERHUB_TOKEN             Docker Hub access token (NOT your password)
#
#   ── AWS EC2 ─────────────────────────────────────────────────────────────────
#   EC2_HOST                    Public IP or DNS of your EC2 instance
#   EC2_USER                    SSH user  (e.g. ubuntu / ec2-user)
#   EC2_SSH_KEY                 Full PEM private key content
#
#   ── Auth Database (Supabase) ────────────────────────────────────────────────
#   AUTH_DB_HOST                e.g. db.xxxx.supabase.co
#   AUTH_DB_PORT                5432
#   AUTH_DB_NAME                postgres
#   AUTH_DB_USER                your Supabase auth DB user
#   AUTH_DB_PASSWORD            your Supabase auth DB password
#
#   ── Hospital Database (Supabase) ────────────────────────────────────────────
#   HOSPITAL_DB_HOST            e.g. db.yyyy.supabase.co
#   HOSPITAL_DB_PORT            5432
#   HOSPITAL_DB_NAME            postgres
#   HOSPITAL_DB_USER            your Supabase hospital DB user
#   HOSPITAL_DB_PASSWORD        your Supabase hospital DB password
#
#   ── Firebase & Auth ─────────────────────────────────────────────────────────
#   FIREBASE_API_KEY            Firebase Web API key
#   FIREBASE_SERVICE_KEY_B64    base64-encoded firebase_service_key.json
#                               Generate with: base64 -w 0 firebase_service_key.json
#   JWT_SECRET                  Long random string  (openssl rand -hex 32)
# =============================================================================

name: CI/CD - NexusCare Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cicd.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-cicd.yml"

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKERHUB_IMAGE: kavindur2003/nexuscare-backend

jobs:
  # ===========================================================================
  # Job 1: Lint & Unit Test
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-flask

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run tests
        env:
          FLASK_ENV: testing
          AUTH_DB_HOST: localhost
          HOSPITAL_DB_HOST: localhost
          FIREBASE_KEY_PATH: ""
          JWT_SECRET: test_secret
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found - skipping."
          fi

  # ===========================================================================
  # Job 2: Docker Build & Smoke Test
  # ===========================================================================
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push yet)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: ${{ env.DOCKERHUB_IMAGE }}:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke test - container starts
        run: |
          docker run -d \
            --name nexuscare-smoke \
            -p 5000:5000 \
            -e FLASK_ENV=testing \
            -e AUTH_DB_HOST=localhost \
            -e HOSPITAL_DB_HOST=localhost \
            -e JWT_SECRET=test_secret \
            -e FIREBASE_KEY_PATH="" \
            ${{ env.DOCKERHUB_IMAGE }}:ci-test

          echo "Waiting for container to start..."
          sleep 15

          STATUS=$(docker inspect --format='{{.State.Status}}' nexuscare-smoke)
          echo "Container status: $STATUS"
          if [ "$STATUS" != "running" ]; then
            echo "FAIL: Container is not running (status: $STATUS)"
            docker logs nexuscare-smoke
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health || echo "000")
          echo "HTTP response from /health: $HTTP_CODE"
          docker logs nexuscare-smoke

          if [ "$HTTP_CODE" != "200" ]; then
            echo "FAIL: Expected HTTP 200 from /health, got $HTTP_CODE"
            exit 1
          fi
          echo "Smoke test passed!"

  # ===========================================================================
  # Job 3: Push to Docker Hub
  # ===========================================================================
  push-dockerhub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build & push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # Job 4: Deploy to AWS EC2 (fully automated – no manual setup required)
  # ===========================================================================
  deploy-ec2:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: push-dockerhub
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # ── Step 1: Write .env and firebase key from GitHub Secrets ─────────────
      - name: Provision secrets on EC2
        uses: appleboy/ssh-action@v1
        env:
          AUTH_DB_HOST: ${{ secrets.AUTH_DB_HOST }}
          AUTH_DB_PORT: ${{ secrets.AUTH_DB_PORT }}
          AUTH_DB_NAME: ${{ secrets.AUTH_DB_NAME }}
          AUTH_DB_USER: ${{ secrets.AUTH_DB_USER }}
          AUTH_DB_PASSWORD: ${{ secrets.AUTH_DB_PASSWORD }}
          HOSPITAL_DB_HOST: ${{ secrets.HOSPITAL_DB_HOST }}
          HOSPITAL_DB_PORT: ${{ secrets.HOSPITAL_DB_PORT }}
          HOSPITAL_DB_NAME: ${{ secrets.HOSPITAL_DB_NAME }}
          HOSPITAL_DB_USER: ${{ secrets.HOSPITAL_DB_USER }}
          HOSPITAL_DB_PASSWORD: ${{ secrets.HOSPITAL_DB_PASSWORD }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_KEY_B64: ${{ secrets.FIREBASE_SERVICE_KEY_B64 }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AUTH_DB_HOST,AUTH_DB_PORT,AUTH_DB_NAME,AUTH_DB_USER,AUTH_DB_PASSWORD,HOSPITAL_DB_HOST,HOSPITAL_DB_PORT,HOSPITAL_DB_NAME,HOSPITAL_DB_USER,HOSPITAL_DB_PASSWORD,FIREBASE_API_KEY,FIREBASE_KEY_B64,JWT_SECRET
          script: |
            set -e
            mkdir -p ~/nexuscare

            # Write .env (overwrite on every deploy so secrets stay in sync)
            cat > ~/nexuscare/.env << ENV_EOF
            AUTH_DB_HOST=$AUTH_DB_HOST
            AUTH_DB_PORT=$AUTH_DB_PORT
            AUTH_DB_NAME=$AUTH_DB_NAME
            AUTH_DB_USER=$AUTH_DB_USER
            AUTH_DB_PASSWORD=$AUTH_DB_PASSWORD
            HOSPITAL_DB_HOST=$HOSPITAL_DB_HOST
            HOSPITAL_DB_PORT=$HOSPITAL_DB_PORT
            HOSPITAL_DB_NAME=$HOSPITAL_DB_NAME
            HOSPITAL_DB_USER=$HOSPITAL_DB_USER
            HOSPITAL_DB_PASSWORD=$HOSPITAL_DB_PASSWORD
            FIREBASE_KEY_PATH=/app/firebase_service_key.json
            FIREBASE_API_KEY=$FIREBASE_API_KEY
            JWT_SECRET=$JWT_SECRET
            ENV_EOF

            # Decode and write firebase service-account key
            echo "$FIREBASE_KEY_B64" | base64 -d > ~/nexuscare/firebase_service_key.json

            # Lock down permissions so only the current user can read them
            chmod 600 ~/nexuscare/.env ~/nexuscare/firebase_service_key.json

            echo "Secrets provisioned successfully."

      # ── Step 2: Pull image and run container ────────────────────────────────
      - name: Deploy container on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest image from Docker Hub ==="
            docker pull kavindur2003/nexuscare-backend:latest

            echo "=== Stopping old container (if running) ==="
            docker stop nexuscare-backend || true
            docker rm nexuscare-backend || true

            echo "=== Starting new container ==="
            docker run -d \
              --name nexuscare-backend \
              --restart unless-stopped \
              -p 5000:5000 \
              --env-file ~/nexuscare/.env \
              -v ~/nexuscare/firebase_service_key.json:/app/firebase_service_key.json:ro \
              kavindur2003/nexuscare-backend:latest

            echo "=== Waiting for health check ==="
            sleep 15
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health/db || echo "000")
            echo "Health check (/health/db): $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "FAIL: Health check returned $HTTP_CODE – rolling back"
              docker stop nexuscare-backend || true
              docker rm nexuscare-backend || true
              exit 1
            fi

            echo "=== Cleaning up old images ==="
            docker image prune -f

            echo "=== Deployment complete! ==="
