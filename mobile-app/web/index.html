<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NexusCare – AI-Powered Smart Health Care Management System">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NexusCare">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>NexusCare</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #F5F7FB;
      overflow: hidden;
    }

    /* Loading screen shown before Flutter initialises */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F5F7FB;
      z-index: 9999;
      gap: 20px;
      transition: opacity 0.4s ease;
    }

    #loading.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .logo-box {
      width: 72px;
      height: 72px;
      background: #0066CC;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box svg {
      width: 42px;
      height: 42px;
      fill: white;
    }

    .app-name {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #1A1A2E;
      letter-spacing: -0.5px;
    }

    .app-tagline {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #9AA5B1;
      letter-spacing: 0.1px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E8ECF0;
      border-top-color: #0066CC;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Splash shown while Flutter downloads and boots -->
  <div id="loading">
    <div class="logo-box">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/>
      </svg>
    </div>
    <div>
      <div class="app-name">NexusCare</div>
      <div class="app-tagline">AI-Powered Smart Health Care</div>
    </div>
    <div class="spinner"></div>
  </div>

  <script>
    // Hide the splash once Flutter signals it's ready
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      loading.classList.add('fade-out');
      setTimeout(() => loading.remove(), 450);
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
